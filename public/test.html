<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="fixed inset-0 z-50 flex items-center justify-center" style="background:#080808f2">
  <div class="w-full max-w-sm px-8 py-10 border border-neutral-800 rounded-lg" style="background:#0e0e0e">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-md flex items-center justify-center" style="background:rgba(234,88,12,0.2);border:1px solid rgba(234,88,12,0.4)">
        <svg class="w-5 h-5" style="color:#f97316" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </div>
      <div>
        <h2 class="text-sm font-semibold" style="color:#e5e5e5;font-family:monospace">管理后台</h2>
        <p class="text-xs" style="color:#737373">Agent 提示词管理</p>
      </div>
    </div>
    <input type="password" class="w-full px-3 py-2 rounded text-sm border" style="background:#1a1a1a;border-color:#404040;color:#e5e5e5;font-family:monospace" placeholder="······"/>
    <button class="w-full py-2 rounded text-sm text-white mt-4" style="background:#ea580c;font-family:monospace">进入后台</button>
  </div>
</div>
</body>
</html>
